<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Artículo — Altair Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/admin.css">

    <link rel="apple-touch-icon" sizes="180x180" href="../favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon_io/favicon-16x16.png">
</head>
<body>

<div class="adm-layout">

    <aside class="adm-sidebar">
        <div class="adm-sidebar__logo">
            <img src="../imagenes/altair_logo3.png" alt="Altair">
            <span class="adm-sidebar__badge">Admin</span>
        </div>
        <nav class="adm-sidebar__nav">
            <a href="index.html">
                <span class="nav-icon"><i class="fas fa-th-large"></i></span>
                Dashboard
            </a>
            <a href="crear-proyecto.html">
                <span class="nav-icon"><i class="fas fa-plus"></i></span>
                Nuevo Proyecto
            </a>
            <a href="crear-articulo.html" class="active">
                <span class="nav-icon"><i class="fas fa-file-alt"></i></span>
                Nuevo Artículo
            </a>
            <a href="../portafolio.html" target="_blank">
                <span class="nav-icon"><i class="fas fa-external-link-alt"></i></span>
                Ver Portafolio
            </a>
            <a href="../index.html" target="_blank">
                <span class="nav-icon"><i class="fas fa-globe"></i></span>
                Ver Sitio Web
            </a>
        </nav>
        <div class="adm-sidebar__footer">
            <a href="index.html" class="btn btn-ghost" style="width:100%;justify-content:center;">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>
    </aside>

    <header class="adm-topbar">
        <span class="adm-topbar__title">
            <strong>ALTAIR</strong> / NUEVO ARTÍCULO
        </span>
        <div class="adm-topbar__actions">
            <a href="index.html" class="btn btn-ghost">
                <i class="fas fa-arrow-left"></i> Cancelar
            </a>
        </div>
    </header>

    <main class="adm-main">
        <form id="create-article-form">
            <div class="adm-form-layout">

                <!-- Columna principal -->
                <div>
                    <div class="adm-form-panel">
                        <div class="adm-form-panel__header">Contenido del Artículo</div>
                        <div class="adm-form-panel__body">
                            <div class="adm-field">
                                <label for="titulo">Título del Artículo *</label>
                                <input type="text" id="titulo" placeholder="Ej: Cómo el diseño web aumenta tus ventas" required>
                            </div>
                            <div class="adm-field">
                                <label for="resumen">Resumen (vista previa en tarjeta) *</label>
                                <textarea id="resumen" rows="3" placeholder="Una o dos frases que inviten a leer..." required></textarea>
                            </div>
                            <div class="adm-field">
                                <label for="contenido">Contenido completo *</label>
                                <textarea id="contenido" rows="14" placeholder="Escribe el artículo completo aquí..." required></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar del formulario -->
                <div class="adm-form-sidebar">
                    <div class="adm-form-panel">
                        <div class="adm-form-panel__header">Imagen de Portada</div>
                        <div class="adm-form-panel__body">
                            <div class="adm-field">
                                <label for="imagen">Subir imagen *</label>
                                <input type="file" id="imagen" accept="image/*" required>
                                <p class="adm-field__hint">JPG, PNG, WebP. Recomendado 1200×630px.</p>
                            </div>
                            <img id="image-preview" class="adm-image-preview" src="" alt="Vista previa">
                        </div>
                    </div>

                    <div class="adm-form-panel">
                        <div class="adm-form-panel__header">Publicar</div>
                        <div class="adm-form-panel__body">
                            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
                                <i class="fas fa-save"></i> Guardar Artículo
                            </button>
                            <p id="feedback-message" class="adm-feedback"></p>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/admin.js"></script>
<script src="../js/crear-articulo.js"></script>
<script>
    // Preview de imagen
    document.getElementById('imagen').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        const preview = document.getElementById('image-preview');
        preview.src = URL.createObjectURL(file);
        preview.classList.add('visible');
    });
</script>
</body>
</html>
