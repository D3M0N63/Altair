<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Altair Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
</head>
<body>

<div class="adm-login-wrap">
    <div class="adm-login-header">
        <img src="imagenes/altair_logo3.png" alt="Altair">
        <p>Panel de administración</p>
    </div>

    <div class="adm-login-box">
        <div class="adm-login-box__header">Autenticación requerida</div>
        <div class="adm-login-box__body">
            <form id="login-form">
                <div class="adm-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@altair.com" required autocomplete="email">
                </div>
                <div class="adm-field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Ingresar →</button>
                <p id="error-message"></p>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/login.js"></script>
</body>
</html>
